name: CI

on:
  push:
  pull_request:

jobs:
  data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: pip install -e .[dev]
      - name: Validate data
        run: python -m scripts.atlas.validate_data
      - name: Run tests
        run: python -m pytest scripts/atlas/tests
      - name: Checkout GT5-Unofficial source (line-anchor reference)
        run: |
          git clone --depth 1 --branch 5.09.52.594 \
            https://github.com/GTNewHorizons/GT5-Unofficial.git "$RUNNER_TEMP/gt5u-src"
      - name: Verify source references (strict, full line-by-line)
        env:
          GT5U_SRC: ${{ runner.temp }}/gt5u-src/src/main/java
        run: python -m scripts.atlas.source_refs --strict

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.2
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
      - name: Install dependencies
        run: |
          pip install -e .[dev]
          pnpm install --frozen-lockfile
      - name: Build site
        run: pnpm build
